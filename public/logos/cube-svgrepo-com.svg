<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradients for the isometric cube faces -->
    <linearGradient id="topFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80b3ff" />
      <stop offset="100%" stop-color="#3385ff" />
    </linearGradient>
    <linearGradient id="leftFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a75ff" />
      <stop offset="100%" stop-color="#0052cc" />
    </linearGradient>
    <linearGradient id="rightFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052cc" />
      <stop offset="100%" stop-color="#003d99" />
    </linearGradient>
    <!-- Subtle drop shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Shadow Group -->
  <g filter="url(#dropShadow)">
    <!-- Top Face -->
    <polygon points="50,15 85,35 50,55 15,35" fill="url(#topFaceGrad)" />
    <!-- Left Face -->
    <polygon points="15,35 50,55 50,85 15,65" fill="url(#leftFaceGrad)" />
    <!-- Right Face -->
    <polygon points="50,55 85,35 85,65 50,85" fill="url(#rightFaceGrad)" />
  </g>
</svg>
