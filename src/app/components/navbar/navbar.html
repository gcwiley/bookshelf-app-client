<nav aria-label="Main Navigation">
  <mat-toolbar class="navbar-container">
    <div class="navbar-content">
      <!-- app title -->
      <a routerLink="/" class="title">
        <img
          src="/logos/angular-logo.svg"
          alt="Bookshelf Logo"
          class="nav-logo" />
        Bookshelf
      </a>

      <span class="flex-spacer" aria-hidden="true"></span>

      <!-- theme toggle -->
      <button
        mat-icon-button
        (click)="toggleTheme()"
        [attr.aria-label]="(isDark$ | async) ? 'Switch to light mode' : 'Switch to dark mode'">
        <mat-icon
          >{{ (isDark$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon
        >
      </button>

      <!-- show admin menu only when authenticated -->
      @if (isAuthenticated$ | async) {
      <button
        mat-icon-button
        class="admin-btn"
        aria-label="Open account menu"
        [matMenuTriggerFor]="adminMenu"
        type="button">
        <mat-icon aria-hidden="false">account_circle</mat-icon>
      </button>

      <mat-menu #adminMenu="matMenu" xPosition="before" yPosition="below">
        <button
          mat-menu-item
          routerLink="/profile"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
          type="button">
          <mat-icon>person</mat-icon>
          <span>User Profile</span>
        </button>
        <button mat-menu-item routerLink="/admin/books/create" type="button">
          <mat-icon>add</mat-icon>
          <span>Add Book</span>
        </button>
        <button mat-menu-item (click)="onClickSignOut()" type="button">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </mat-menu>
      } @else {
      <a mat-icon-button routerLink="/signin" aria-label="Sign in">
        <mat-icon>login</mat-icon>
      </a>
      }
    </div>
  </mat-toolbar>
</nav>
