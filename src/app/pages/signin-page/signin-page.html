<main class="signin-page-container" aria-label="Sign In Page">
  <mat-card class="signin-form" appearance="raised">
    <div class="title-text">
      <h1>Welcome to Bookshelf</h1>
      <p>Please sign in using your Google account to access your library.</p>
    </div>
    <mat-card-content class="signin-actions">
      <!-- Google Sign In Button -->
      <button
        mat-stroked-button
        class="google-btn"
        type="button"
        (click)="onSignInWithGoogle()"
        [disabled]="isLoading()">
        @if (isLoading()) {
        <mat-spinner diameter="20"></mat-spinner>
        } @else {

        <span class="google-label">Sign in with Google</span>
        }
      </button>
    </mat-card-content>
    <mat-card-footer
      class="signin-footer"
      role="contentinfo"
      aria-label="Copyright">
      <small>&copy; {{ year }} Gregory Wiley. All rights reserved.</small>
    </mat-card-footer>
  </mat-card>
</main>
